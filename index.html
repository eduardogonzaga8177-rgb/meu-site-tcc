<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Comunicação Escolar</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #d6ecff, #f0f8ff);
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 30px;
  width: 90%;
  max-width: 400px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

input, select {
  width: 90%;
  padding: 10px;
  margin: 10px;
}

button {
  width: 90%;
  padding: 15px;
  margin: 8px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

.botao {
  background: #4da6ff;
  color: white;
  font-size: 18px;
}

#chat {
  height: 250px;
  background: #fff;
  overflow-y: auto;
  border-radius: 10px;
  padding: 10px;
}

.alunoMsg {
  background: #4da6ff;
  color: white;
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  text-align: right;
}

.secMsg {
  background: #5cc27d;
  color: white;
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  text-align: left;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="login">
  <h2>Login</h2>
  <input id="nome" placeholder="Nome">
  <input id="senha" type="password" placeholder="Senha">

  <select id="tipo">
    <option value="">Tipo</option>
    <option value="Aluno">Aluno</option>
    <option value="Secretaria">Secretaria</option>
  </select>

  <button onclick="login()">Entrar</button>
</div>

<!-- FICHA -->
<div class="card" id="ficha" style="display:none;">
  <h2>Ficha Médica</h2>

  <label>Autista?</label>
  <select id="autismo">
    <option>Não</option>
    <option>Sim</option>
  </select>

  <label>Grau:</label>
  <select id="grau">
    <option>Leve</option>
    <option>Moderado</option>
    <option>Severo</option>
  </select>

  <button onclick="salvarFicha()">Continuar</button>
</div>

<!-- SISTEMA -->
<div class="card" id="sistema" style="display:none;">
  <h2 id="titulo"></h2>

  <div id="botoesAluno">
    <button class="botao" onclick="enviar('🆘 Preciso de ajuda')">🆘 Ajuda</button>
    <button class="botao" onclick="enviar('🚻 Quero ir ao banheiro')">🚻 Banheiro</button>
    <button class="botao" onclick="enviar('🤒 Estou passando mal')">🤒 Mal</button>
    <button class="botao" onclick="enviar('🏠 Quero ir para casa')">🏠 Casa</button>
  </div>

  <div id="chat"></div>

  <input id="mensagem" placeholder="Digite mensagem">
  <button onclick="enviarDigitado()">Enviar</button>

  <button onclick="limpar()">🗑 Limpar</button>
</div>

  <script>
let nome = "";
let tipo = "";
let alunoSelecionado = "";
let ultimaMsg = "";

// AUTO LOGIN
window.onload = function() {
  let user = JSON.parse(localStorage.getItem("usuarioLogado"));
  if (user) {
    nome = user.nome;
    tipo = user.tipo;
    abrirSistema();
  }
};

// LOGIN
function login() {
  let nomeInput = document.getElementById("nome").value;
  let senha = document.getElementById("senha").value;
  tipo = document.getElementById("tipo").value;

  if (!nomeInput || !senha || !tipo) {
    alert("Preencha tudo!");
    return;
  }

  let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
  let usuario = usuarios.find(u => u.nome === nomeInput && u.senha === senha);

  if (!usuario) {
    usuarios.push({ nome: nomeInput, senha, tipo });
    localStorage.setItem("usuarios", JSON.stringify(usuarios));
    nome = nomeInput;

    if (tipo === "Aluno") {
      mostrarFicha(); // 👈 aqui chama a ficha
    } else {
      localStorage.setItem("usuarioLogado", JSON.stringify({nome, tipo}));
      abrirSistema();
    }
    return;
  }

  nome = nomeInput;

  if (tipo === "Aluno") {
    mostrarFicha(); // 👈 aqui também
  } else {
    localStorage.setItem("usuarioLogado", JSON.stringify({nome, tipo}));
    abrirSistema();
  }
}

// ✅ FUNÇÃO QUE VOCÊ PEDIU (CORRETA)
function mostrarFicha() {
  if (tipo !== "Aluno") return;

  document.getElementById("login").style.display = "none";
  document.getElementById("ficha").style.display = "block";
}

// SALVAR FICHA
function salvarFicha() {
  let autismo = document.getElementById("autismo").value;
  let grau = document.getElementById("grau").value;

  localStorage.setItem("ficha_" + nome, JSON.stringify({autismo, grau}));
  localStorage.setItem("usuarioLogado", JSON.stringify({nome, tipo}));

  abrirSistema();
}

// SISTEMA
function abrirSistema() {
  document.getElementById("login").style.display = "none";
  document.getElementById("ficha").style.display = "none";
  document.getElementById("sistema").style.display = "block";

  if (tipo === "Secretaria") {
    document.getElementById("botoesAluno").style.display = "none";
    mostrarListaAlunos();
  } else {
    document.getElementById("botoesAluno").style.display = "block";
  }

  atualizar();
}

// LISTA DE ALUNOS
function mostrarListaAlunos() {
  let container = document.createElement("div");
  container.id = "listaAlunos";

  atualizarLista(container);

  document.getElementById("sistema").insertBefore(container, document.getElementById("chat"));

  setInterval(() => atualizarLista(container), 2000);
}

// ORDENAR POR MAIS RECENTE
function atualizarLista(container) {
  let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
  let alunos = usuarios.filter(u => u.tipo === "Aluno");

  alunos.sort((a, b) => {
    let chatA = JSON.parse(localStorage.getItem("chat_" + a.nome)) || [];
    let chatB = JSON.parse(localStorage.getItem("chat_" + b.nome)) || [];
    return chatB.length - chatA.length;
  });

  container.innerHTML = "<b>Alunos:</b><br>";

  alunos.forEach(a => {
    let btn = document.createElement("button");
    btn.innerText = a.nome;
    btn.onclick = () => {
      alunoSelecionado = a.nome;
      atualizar();
    };
    container.appendChild(btn);
  });
}

// CHAT
function salvar(msg) {
  let alvo = tipo === "Secretaria" ? alunoSelecionado : nome;

  let key = "chat_" + alvo;
  let chat = JSON.parse(localStorage.getItem(key)) || [];

  chat.push(msg);
  localStorage.setItem(key, JSON.stringify(chat));
}

function carregar() {
  let alvo = tipo === "Secretaria" ? alunoSelecionado : nome;
  return JSON.parse(localStorage.getItem("chat_" + alvo)) || [];
}

function atualizar() {
  let chatDiv = document.getElementById("chat");

  if (tipo === "Secretaria" && !alunoSelecionado) {
    chatDiv.innerHTML = "<i>Escolha um aluno</i>";
    return;
  }

  chatDiv.innerHTML = "";

  let msgs = carregar();

  msgs.forEach(m => {
    let div = document.createElement("div");
    div.className = m.includes(nome) ? "alunoMsg" : "secMsg";
    div.innerText = m;
    chatDiv.appendChild(div);
  });

  chatDiv.scrollTop = chatDiv.scrollHeight;
}

// ENVIAR
function enviar(texto) {
  if (tipo === "Secretaria" && !alunoSelecionado) {
    alert("Escolha um aluno!");
    return;
  }

  salvar(tipo + " (" + nome + "): " + texto);
  atualizar();
}

function enviarDigitado() {
  let t = document.getElementById("mensagem").value;
  if (t) {
    enviar(t);
    document.getElementById("mensagem").value = "";
  }
}

// LIMPAR
function limpar() {
  let alvo = tipo === "Secretaria" ? alunoSelecionado : nome;
  localStorage.removeItem("chat_" + alvo);
  atualizar();
}

// LOGOUT
function logout() {
  localStorage.removeItem("usuarioLogado");
  location.reload();
}

setInterval(atualizar, 1000);
  </script>
