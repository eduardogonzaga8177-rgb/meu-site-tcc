<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Comunicação Escolar</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #d6ecff, #f0f8ff);
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 30px;
  width: 90%;
  max-width: 400px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

input, select {
  width: 90%;
  padding: 10px;
  margin: 10px;
}

button {
  width: 90%;
  padding: 15px;
  margin: 8px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

.botao {
  background: #4da6ff;
  color: white;
  font-size: 18px;
}

#chat {
  height: 250px;
  background: #fff;
  overflow-y: auto;
  border-radius: 10px;
  padding: 10px;
}

.alunoMsg {
  background: #4da6ff;
  color: white;
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  text-align: right;
}

.secMsg {
  background: #5cc27d;
  color: white;
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  text-align: left;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="login">
  <h2>Login</h2>
  <input id="nome" placeholder="Nome">
  <input id="senha" type="password" placeholder="Senha">

  <select id="tipo">
    <option value="">Tipo</option>
    <option value="Aluno">Aluno</option>
    <option value="Secretaria">Secretaria</option>
  </select>

  <button onclick="login()">Entrar</button>
</div>

<!-- FICHA -->
<div class="card" id="ficha" style="display:none;">
  <h2>Ficha Médica</h2>

  <label>Autista?</label>
  <select id="autismo">
    <option>Não</option>
    <option>Sim</option>
  </select>

  <label>Grau:</label>
  <select id="grau">
    <option>Leve</option>
    <option>Moderado</option>
    <option>Severo</option>
  </select>

  <button onclick="salvarFicha()">Continuar</button>
</div>

<!-- SISTEMA -->
<div class="card" id="sistema" style="display:none;">
  <h2 id="titulo"></h2>

  <div id="botoesAluno">
    <button class="botao" onclick="enviar('🆘 Preciso de ajuda')">🆘 Ajuda</button>
    <button class="botao" onclick="enviar('🚻 Quero ir ao banheiro')">🚻 Banheiro</button>
    <button class="botao" onclick="enviar('🤒 Estou passando mal')">🤒 Mal</button>
    <button class="botao" onclick="enviar('🏠 Quero ir para casa')">🏠 Casa</button>
  </div>

  <div id="chat"></div>

  <input id="mensagem" placeholder="Digite mensagem">
  <button onclick="enviarDigitado()">Enviar</button>

  <button onclick="limpar()">🗑 Limpar</button>
</div>

<script>
let nome = "";
let tipo = "";

// LOGIN
function login() {
  const nomeInput = document.getElementById("nome").value;
  const senha = document.getElementById("senha").value;
  tipo = document.getElementById("tipo").value;

  if (!nomeInput || !senha || !tipo) {
    alert("Preencha tudo!");
    return;
  }

  nome = nomeInput;

  const nomeSalvo = localStorage.getItem("nome");
  const senhaSalva = localStorage.getItem("senha");

  // PRIMEIRO ACESSO
  if (!nomeSalvo && !senhaSalva) {
    localStorage.setItem("nome", nomeInput);
    localStorage.setItem("senha", senha);
    alert("Cadastro realizado!");
    mostrarFicha();
    return;
  }

  // LOGIN
  if (nomeInput === nomeSalvo && senha === senhaSalva) {
    mostrarFicha();
  } else {
    alert("Nome ou senha incorretos!");
  }
}

// MOSTRAR FICHA
function mostrarFicha() {
  document.getElementById("login").style.display = "none";
  document.getElementById("ficha").style.display = "block";
}

// SALVAR FICHA
function salvarFicha() {
  let autismo = document.getElementById("autismo").value;
  let grau = document.getElementById("grau").value;

  localStorage.setItem("autismo", autismo);
  localStorage.setItem("grau", grau);

  document.getElementById("ficha").style.display = "none";
  document.getElementById("sistema").style.display = "block";

  document.getElementById("titulo").innerText =
    tipo + ": " + nome + " | Autista: " + autismo + " | Grau: " + grau;

  if (tipo === "Secretaria") {
    document.getElementById("botoesAluno").style.display = "none";
  }

  atualizar();
}

// CHAT
function salvar(msg) {
  let chat = JSON.parse(localStorage.getItem("chat")) || [];
  chat.push(msg);
  localStorage.setItem("chat", JSON.stringify(chat));
}

function carregar() {
  return JSON.parse(localStorage.getItem("chat")) || [];
}

function atualizar() {
  let chatDiv = document.getElementById("chat");
  chatDiv.innerHTML = "";

  carregar().forEach(m => {
    let div = document.createElement("div");

    if (m.startsWith("Aluno")) {
      div.className = "alunoMsg";
    } else {
      div.className = "secMsg";
    }

    div.innerText = m;
    chatDiv.appendChild(div);
  });
}

function falar(texto) {
  let voz = new SpeechSynthesisUtterance(texto);
  voz.lang = "pt-BR";
  speechSynthesis.speak(voz);
}

function enviar(texto) {
  let msg = tipo + " (" + nome + "): " + texto;
  salvar(msg);
  falar(texto);
  atualizar();
}

function enviarDigitado() {
  let texto = document.getElementById("mensagem").value;

  if (texto) {
    enviar(texto);
    document.getElementById("mensagem").value = "";
  }
}

function limpar() {
  localStorage.removeItem("chat");
  atualizar();
}

setInterval(atualizar, 1000);
</script>

</body>
</html>
