<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Comunicação Escolar</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #d6ecff, #f0f8ff);
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 30px;
  width: 90%;
  max-width: 400px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

input, select {
  width: 90%;
  padding: 10px;
  margin: 10px;
}

button {
  width: 90%;
  padding: 15px;
  margin: 8px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

.botao {
  background: #4da6ff;
  color: white;
  font-size: 18px;
}

#chat {
  height: 300px;
  background: #e5ddd5;
  overflow-y: auto;
  border-radius: 10px;
  padding: 10px;
}

.alunoMsg {
  background: #dcf8c6;
  margin: 5px;
  padding: 10px;
  border-radius: 10px 10px 0 10px;
  text-align: right;
  max-width: 70%;
  margin-left: auto;
}

.secMsg {
  background: #fff;
  margin: 5px;
  padding: 10px;
  border-radius: 10px 10px 10px 0;
  max-width: 70%;
  margin-right: auto;
  border: 1px solid #ddd;
}
</style>
</head>

<body>

<audio id="somMsg">
  <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3">
</audio>

<!-- LOGIN -->
<div class="card" id="login">
  <h2>Login</h2>
  <input id="nome" placeholder="Nome">
  <input id="senha" type="password" placeholder="Senha">

  <select id="tipo">
    <option value="">Tipo</option>
    <option value="Aluno">Aluno</option>
    <option value="Secretaria">Secretaria</option>
  </select>

  <button onclick="login()">Entrar</button>
</div>

<!-- FICHA -->
<div class="card" id="ficha" style="display:none;">
  <h2>Ficha Médica</h2>

  <label>Autista?</label>
  <select id="autismo">
    <option>Não</option>
    <option>Sim</option>
  </select>

  <label>Grau:</label>
  <select id="grau">
    <option>Leve</option>
    <option>Moderado</option>
    <option>Severo</option>
  </select>

  <button onclick="salvarFicha()">Continuar</button>
</div>

<!-- SISTEMA -->
<div class="card" id="sistema" style="display:none;">
  <h2 id="titulo"></h2>

  <div id="botoesAluno">
    <button class="botao" onclick="enviar('🆘 Preciso de ajuda')">🆘 Ajuda</button>
    <button class="botao" onclick="enviar('🚻 Quero ir ao banheiro')">🚻 Banheiro</button>
    <button class="botao" onclick="enviar('🤒 Estou passando mal')">🤒 Mal</button>
    <button class="botao" onclick="enviar('🏠 Quero ir para casa')">🏠 Casa</button>
  </div>

  <div id="listaAlunos"></div>
  <div id="chat"></div>

  <input id="mensagem" placeholder="Digite mensagem">
  <button onclick="enviarDigitado()">Enviar</button>
  <button onclick="limpar()">🗑 Limpar</button>
</div>

<script>

const SECRETARIA_LOGIN = "adm_secretaria";
const SECRETARIA_SENHA = "secretaria123";

let nome = "";
let tipo = "";
let alunoSelecionado = "";

// AUTO LOGIN
window.onload = () => {
  let user = JSON.parse(localStorage.getItem("usuarioLogado"));
  if (user) {
    nome = user.nome;
    tipo = user.tipo;
    abrirSistema();
  }
};

// LOGIN
function login() {
  let nomeInput = nomeEl().value;
  let senha = senhaEl().value;
  tipo = tipoEl().value;

  if (!nomeInput || !senha || !tipo) return alert("Preencha tudo!");

  if (tipo === "Secretaria") {
    if (nomeInput === SECRETARIA_LOGIN && senha === SECRETARIA_SENHA) {
      nome = nomeInput;
      salvarLogin();
      abrirSistema();
    } else {
      alert("Acesso negado!");
    }
    return;
  }

  let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
  let user = usuarios.find(u => u.nome === nomeInput && u.senha === senha);

  if (!user) {
    usuarios.push({ nome: nomeInput, senha, tipo });
    localStorage.setItem("usuarios", JSON.stringify(usuarios));
  }

  nome = nomeInput;
  mostrarFicha();
}

// FICHA
function mostrarFicha() {
  if (tipo !== "Aluno") return;
  loginDiv().style.display = "none";
  fichaDiv().style.display = "block";
}

function salvarFicha() {
  let autismo = document.getElementById("autismo").value;
  let grau = document.getElementById("grau").value;

  localStorage.setItem("ficha_" + nome, JSON.stringify({autismo, grau}));
  salvarLogin();
  abrirSistema();
}

// SISTEMA
function abrirSistema() {
  loginDiv().style.display = "none";
  fichaDiv().style.display = "none";
  sistemaDiv().style.display = "block";

  if (tipo === "Secretaria") {
    botoesAluno().style.display = "none";
    setInterval(atualizarLista, 2000);
  }

  atualizar();
}

// LISTA
function atualizarLista() {
  let lista = document.getElementById("listaAlunos");
  lista.innerHTML = "<b>Alunos:</b><br>";

  let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
  let alunos = usuarios.filter(u => u.tipo === "Aluno");

  alunos.forEach(a => {
    let btn = document.createElement("button");
    btn.innerText = a.nome;

    btn.onclick = () => {
      alunoSelecionado = a.nome;
      atualizar();
    };

    lista.appendChild(btn);
  });
}

// CHAT
function salvar(msg) {
  let alvo = tipo === "Secretaria" ? alunoSelecionado : nome;
  let key = "chat_" + alvo;

  let chat = JSON.parse(localStorage.getItem(key)) || [];
  chat.push(msg);

  localStorage.setItem(key, JSON.stringify(chat));
  document.getElementById("somMsg").play();
}

function carregar() {
  let alvo = tipo === "Secretaria" ? alunoSelecionado : nome;
  return JSON.parse(localStorage.getItem("chat_" + alvo)) || [];
}

function atualizar() {
  let chat = chatDiv();

  if (tipo === "Secretaria" && !alunoSelecionado) {
    chat.innerHTML = "<i>Escolha um aluno</i>";
    return;
  }

  chat.innerHTML = "";

  carregar().forEach(m => {
    let div = document.createElement("div");
    div.className = m.includes(nome) ? "alunoMsg" : "secMsg";
    div.innerText = m;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

// ENVIAR
function enviar(txt) {
  if (tipo === "Secretaria" && !alunoSelecionado) {
    return alert("Escolha um aluno!");
  }

  salvar(tipo + " (" + nome + "): " + txt);
  atualizar();
}

function enviarDigitado() {
  let msg = document.getElementById("mensagem").value;
  if (!msg) return;

  enviar(msg);
  document.getElementById("mensagem").value = "";
}

// LIMPAR
function limpar() {
  let alvo = tipo === "Secretaria" ? alunoSelecionado : nome;
  localStorage.removeItem("chat_" + alvo);
  atualizar();
}

// HELPERS
function nomeEl(){return document.getElementById("nome")}
function senhaEl(){return document.getElementById("senha")}
function tipoEl(){return document.getElementById("tipo")}
function loginDiv(){return document.getElementById("login")}
function fichaDiv(){return document.getElementById("ficha")}
function sistemaDiv(){return document.getElementById("sistema")}
function chatDiv(){return document.getElementById("chat")}
function botoesAluno(){return document.getElementById("botoesAluno")}
function salvarLogin(){
  localStorage.setItem("usuarioLogado", JSON.stringify({nome, tipo}));
}

setInterval(atualizar, 1000);

</script>

</body>
</html>
