<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Comunicação Escolar</title><style>
body {
  font-family: Arial, sans-serif;
  background: #111b21;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #0b141a;
  padding: 20px;
  width: 95%;
  max-width: 420px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  color: white;
}

h2 {
  text-align: center;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  outline: none;
  background: #202c33;
  color: white;
}

button {
  width: 100%;
  padding: 16px;
  margin: 6px 0;
  border-radius: 12px;
  border: none;
  font-size: 17px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  opacity: 0.85;
}

.botao {
  background: #25d366;
  color: white;
  font-weight: bold;
}

#chat {
  height: 300px;
  background: #111b21;
  overflow-y: auto;
  border-radius: 10px;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

.alunoMsg {
  background: #005c4b;
  color: white;
  margin: 5px;
  padding: 10px 12px;
  border-radius: 10px 10px 0 10px;
  align-self: flex-end;
  max-width: 75%;
}

.secMsg {
  background: #202c33;
  margin: 5px;
  padding: 10px 12px;
  border-radius: 10px 10px 10px 0;
  align-self: flex-start;
  max-width: 75%;
}

#listaAlunos button {
  background: #202c33;
  color: white;
  margin: 4px 0;
}

#topo {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.logout {
  background: #ff3b30;
}

</style></head><body><audio id="somMsg">
  <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3">
</audio><div class="card" id="login">
  <h2>Login</h2>
  <input id="nome" placeholder="Nome">
  <input id="senha" type="password" placeholder="Senha">  <select id="tipo">
    <option value="">Tipo</option>
    <option value="Aluno">Aluno</option>
    <option value="Secretaria">Secretaria</option>
  </select><button class="botao" onclick="login()">Entrar</button>

</div><div class="card" id="ficha" style="display:none;">
  <h2>Ficha Médica</h2><label>Autista?</label> <select id="autismo"> <option>Não</option> <option>Sim</option> </select>

<label>Grau:</label> <select id="grau"> <option>Leve</option> <option>Moderado</option> <option>Severo</option> </select>

<button class="botao" onclick="salvarFicha()">Continuar</button>

</div><div class="card" id="sistema" style="display:none;"><div id="topo">
  <h3 id="titulo"></h3>
  <button class="logout" onclick="logout()">Sair</button>
</div>  <div id="botoesAluno">
    <button class="botao" onclick="enviar('🆘 Preciso de ajuda')">🆘 Ajuda</button>
    <button class="botao" onclick="enviar('🚻 Quero ir ao banheiro')">🚻 Banheiro</button>
    <button class="botao" onclick="enviar('🤒 Estou passando mal')">🤒 Mal</button>
    <button class="botao" onclick="enviar('🏠 Quero ir para casa')">🏠 Casa</button>
  </div>  <div id="listaAlunos"></div>  <div id="chat"></div>  <input id="mensagem" placeholder="Digite mensagem">
  <button class="botao" onclick="enviarDigitado()">Enviar</button>
  <button onclick="limpar()">🗑 Limpar</button>
</div><script>

const SECRETARIA_LOGIN = "adm_secretaria";
const SECRETARIA_SENHA = "secretaria123";

let nome = "";
let tipo = "";
let alunoSelecionado = "";

window.onload = () => {
  let user = JSON.parse(localStorage.getItem("usuarioLogado"));
  if (user) {
    nome = user.nome;
    tipo = user.tipo;
    abrirSistema();
  }
};

function login() {
  let nomeInput = document.getElementById("nome").value;
  let senha = document.getElementById("senha").value;
  let tipoSelecionado = document.getElementById("tipo").value;

  if (!nomeInput || !senha || !tipoSelecionado) {
    alert("Preencha tudo!");
    return;
  }

  tipo = tipoSelecionado;

  if (tipo === "Secretaria") {
    if (nomeInput === SECRETARIA_LOGIN && senha === SECRETARIA_SENHA) {
      nome = nomeInput;
      salvarLogin();
      abrirSistema();
    } else {
      alert("Acesso negado!");
    }
    return;
  }

  let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
  let user = usuarios.find(u => u.nome === nomeInput && u.senha === senha);

  if (!user) {
    usuarios.push({ nome: nomeInput, senha, tipo });
    localStorage.setItem("usuarios", JSON.stringify(usuarios));
  }

  nome = nomeInput;
  mostrarFicha();
}

function mostrarFicha() {
  loginDiv().style.display = "none";
  fichaDiv().style.display = "block";
}

function salvarFicha() {
  let autismo = document.getElementById("autismo").value;
  let grau = document.getElementById("grau").value;

  localStorage.setItem("ficha_" + nome, JSON.stringify({autismo, grau}));
  salvarLogin();
  abrirSistema();
}

function abrirSistema() {
  loginDiv().style.display = "none";
  fichaDiv().style.display = "none";
  sistemaDiv().style.display = "block";

  document.getElementById("titulo").innerText = nome;

  if (tipo === "Secretaria") {
    botoesAluno().style.display = "none";
    setInterval(atualizarLista, 2000);
  }

  atualizar();
}

function atualizarLista() {
  let lista = document.getElementById("listaAlunos");
  lista.innerHTML = "<b>Alunos:</b>";

  let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
  let alunos = usuarios.filter(u => u.tipo === "Aluno");

  alunos.forEach(a => {
    let btn = document.createElement("button");
    btn.innerText = a.nome;

    btn.onclick = () => {
      alunoSelecionado = a.nome;
      atualizar();
    };

    lista.appendChild(btn);
  });
}

function salvar(msg) {
  let alvo = tipo === "Secretaria" ? alunoSelecionado : nome;
  let key = "chat_" + alvo;

  let chat = JSON.parse(localStorage.getItem(key)) || [];
  chat.push(msg);

  localStorage.setItem(key, JSON.stringify(chat));
  document.getElementById("somMsg").play();
}

function carregar() {
  let alvo = tipo === "Secretaria" ? alunoSelecionado : nome;
  return JSON.parse(localStorage.getItem("chat_" + alvo)) || [];
}

function atualizar() {
  let chat = chatDiv();

  if (tipo === "Secretaria" && !alunoSelecionado) {
    chat.innerHTML = "<i>Escolha um aluno</i>";
    return;
  }

  chat.innerHTML = "";

  carregar().forEach(m => {
    let div = document.createElement("div");
    div.className = m.includes(nome) ? "alunoMsg" : "secMsg";
    div.innerText = m;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

function enviar(txt) {
  if (tipo === "Secretaria" && !alunoSelecionado) {
    alert("Escolha um aluno!");
    return;
  }

  salvar(tipo + " (" + nome + "): " + txt);
  atualizar();
}

function enviarDigitado() {
  let msg = document.getElementById("mensagem").value;
  if (!msg) return;

  enviar(msg);
  document.getElementById("mensagem").value = "";
}

function limpar() {
  let alvo = tipo === "Secretaria" ? alunoSelecionado : nome;
  localStorage.removeItem("chat_" + alvo);
  atualizar();
}

function logout() {
  localStorage.removeItem("usuarioLogado");
  location.reload();
}

function loginDiv(){return document.getElementById("login")}
function fichaDiv(){return document.getElementById("ficha")}
function sistemaDiv(){return document.getElementById("sistema")}
function chatDiv(){return document.getElementById("chat")}
function botoesAluno(){return document.getElementById("botoesAluno")}
function salvarLogin(){
  localStorage.setItem("usuarioLogado", JSON.stringify({nome, tipo}));
}

setInterval(atualizar, 1000);

</script></body>
</html>
